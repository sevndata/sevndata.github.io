<h2 id="1-问题"><a href="#1-问题" class="headerlink" title="1.问题"></a>1.问题</h2><p><code>Spring Boot</code>项目中发现时间差8小时问题，猜测<code>Jackson</code>序列化时间出现问题。</p>
<h2 id="2-解决"><a href="#2-解决" class="headerlink" title="2.解决"></a>2.解决</h2><p>设置<code>Jackson</code>时区：</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">spring.jackson.locale=zh_CN</span><br><span class="line">spring.jackson.time-zone=GMT+<span class="number">8</span></span><br></pre></td></tr></table></figure>

<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@Bean</span></span><br><span class="line"><span class="keyword">public</span> Jackson2ObjectMapperBuilderCustomizer <span class="title function_">jacksonObjectMapperCustomization</span><span class="params">()</span> &#123;</span><br><span class="line">  <span class="keyword">return</span> jacksonObjectMapperBuilder -&gt;</span><br><span class="line">        jacksonObjectMapperBuilder.timeZone(TimeZone.getTimeZone(<span class="string">&quot;GMT+8&quot;</span>));</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@JsonFormat(timezone=&quot;GMT+8&quot;)</span></span><br></pre></td></tr></table></figure>
